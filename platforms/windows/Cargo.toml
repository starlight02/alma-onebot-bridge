[package]
name = "alma-onebot-bridge-windows"
version = "0.1.5"
edition = "2024"
license = "AGPL-3.0-only"
publish = false

[[bin]]
name = "AlmaOneBotBridge"
path = "src/main.rs"

[target.'cfg(windows)'.dependencies]
alma-onebot-bridge = { path = "../.." }
dirs = "6.0.0"
serde = { version = "1.0.228", features = ["derive"] }
tokio = { version = "1.52.3", features = ["full"] }
toml = "0.8"
tracing = "0.1.44"
tracing-appender = "0.2.5"
velopack = "1.2.0"
windows-reactor = { git = "https://github.com/microsoft/windows-rs", package = "windows-reactor" }
windows-sys = { version = "0.61.2", features = [
    "Win32_Foundation",
    "Win32_Graphics_Gdi",
    "Win32_System_LibraryLoader",
    "Win32_System_Threading",
    "Win32_UI_Shell",
    "Win32_UI_WindowsAndMessaging",
] }

[build-dependencies]
windows-reactor-setup = { git = "https://github.com/microsoft/windows-rs", package = "windows-reactor-setup" }

[profile.release]
codegen-units = 1
lto = "thin"
panic = "abort"
strip = "symbols"
