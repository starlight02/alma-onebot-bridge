version: 2
# 所有 ecosystem 启用 auto-merge：Dependabot 在 CI 通过后自动 squash merge。
# 前提：master 分支保护已要求 "Test Rust bridge" + "Check Windows GNU app"
# 状态检查通过（见 .github 仓库设置），仓库已开启 Allow auto-merge。
updates:
  # Rust 主工程依赖
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    auto-merge: true
    commit-message:
      prefix: "deps"
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  # Windows 平台 Rust 子工程依赖
  - package-ecosystem: cargo
    directory: "/platforms/windows"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    auto-merge: true
    commit-message:
      prefix: "deps(windows)"
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  # macOS 平台 Swift Package Manager 依赖（Xcode 项目，依赖定义在 .xcodeproj 内）
  - package-ecosystem: swift
    directory: "/platforms/macos"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    auto-merge: true
    commit-message:
      prefix: "deps(macos)"
    groups:
      swift-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions workflow 依赖
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    auto-merge: true
    commit-message:
      prefix: "ci"

  # Dockerfile base image（rust / debian-slim）digest 更新
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    auto-merge: true
    commit-message:
      prefix: "ci(docker)"
