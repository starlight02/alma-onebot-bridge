name: Docker Image

# 推送版本 tag（v*）时自动构建 Linux amd64 镜像并发布到 GHCR。
# workflow_dispatch 可手动触发测试构建，但不打 latest 标签（避免非 release 覆盖 latest）。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# 同一 ref 的新一轮触发取消进行中的旧 run，节省 runner。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 默认最小权限；packages: write 用于推送镜像到 GHCR。
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: scripts/verify-version.sh --tag "$GITHUB_REF_NAME"

      - name: Verify package version metadata
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: scripts/verify-version.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}
            type=semver,pattern={{major.minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=sha,prefix=manual-,format=short,enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=Alma OneBot Bridge
            org.opencontainers.image.description=Bridge service connecting Alma to QQ through OneBot v11
            org.opencontainers.image.licenses=AGPL-3.0-only
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
