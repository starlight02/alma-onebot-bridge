name: Desktop Packages

on:
  pull_request:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test Rust bridge
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            platforms/windows -> platforms/windows

      - name: Verify release version metadata
        run: scripts/verify-version.sh

      - name: Run Rust tests
        run: cargo test

  build-pkg:
    name: Build macOS PKG (${{ matrix.package_arch }})
    runs-on: macos-26
    needs: test
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_arch: arm64
            target: aarch64-apple-darwin
            archs: arm64
          - package_arch: amd64
            target: x86_64-apple-darwin
            archs: x86_64
    env:
      MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APP_SIGN_IDENTITY: ${{ secrets.APP_SIGN_IDENTITY }}
      INSTALLER_SIGN_IDENTITY: ${{ secrets.INSTALLER_SIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: scripts/verify-version.sh --tag "$GITHUB_REF_NAME"

      - name: Verify package version metadata
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: scripts/verify-version.sh

      - name: Select Xcode with macOS 26 SDK
        run: |
          set -euo pipefail
          shopt -s nullglob

          candidates=(
            /Applications/Xcode_27*.app
            /Applications/Xcode_26*.app
            /Applications/Xcode-beta.app
            /Applications/Xcode.app
          )

          selected=""
          while IFS= read -r app; do
            [[ -x "$app/Contents/Developer/usr/bin/xcodebuild" ]] || continue
            if "$app/Contents/Developer/usr/bin/xcodebuild" -showsdks | grep -Eq "macosx2[67]"; then
              selected="$app"
              break
            fi
          done < <(printf "%s\n" "${candidates[@]}" | sort -r)

          if [[ -z "$selected" ]]; then
            echo "No installed Xcode provides the macOS 26 SDK required by the macOS app." >&2
            xcodebuild -version || true
            xcodebuild -showsdks || true
            exit 1
          fi

          sudo xcode-select -s "$selected/Contents/Developer"
          xcodebuild -version
          xcodebuild -showsdks | grep -E "macosx2[67]"

      - name: Install Rust macOS targets
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            platforms/windows -> platforms/windows
          cache-targets: true

      - name: Select signing mode
        run: |
          signing_names=(
            MACOS_CERTIFICATE_P12_BASE64 \
            MACOS_CERTIFICATE_PASSWORD \
            KEYCHAIN_PASSWORD \
            APP_SIGN_IDENTITY \
            INSTALLER_SIGN_IDENTITY \
            APPLE_ID \
            APPLE_TEAM_ID \
            APPLE_APP_SPECIFIC_PASSWORD
          )

          present=0
          missing=0
          for name in "${signing_names[@]}"; do
            if [[ -n "${!name}" ]]; then
              present=$((present + 1))
            fi
          done

          if [[ "$present" -eq 0 ]]; then
            echo "SIGNING_MODE=unsigned" >> "$GITHUB_ENV"
            echo "No Apple signing secrets configured. Building unsigned PKG."
            exit 0
          fi

          for name in "${signing_names[@]}"; do
            if [[ -z "${!name}" ]]; then
              echo "Missing signing secret: $name" >&2
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "Partial signing configuration is unsafe. Provide all signing secrets or remove them all for unsigned builds." >&2
            exit 1
          fi

          echo "SIGNING_MODE=signed" >> "$GITHUB_ENV"
          echo "Apple signing secrets configured. Building signed and notarized PKG."

      - name: Import Apple signing certificates
        run: |
          if [[ "${SIGNING_MODE}" != "signed" ]]; then
            echo "Skipping certificate import for unsigned build."
            exit 0
          fi

          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild \
            -T /usr/bin/security
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

      - name: Build PKG installer
        run: |
          if [[ "${SIGNING_MODE}" == "signed" ]]; then
            export NOTARIZE=1
          else
            unset APP_SIGN_IDENTITY INSTALLER_SIGN_IDENTITY
          fi
          export PACKAGE_ARCH="${{ matrix.package_arch }}"
          export ARCHS="${{ matrix.archs }}"
          export TARGET="${{ matrix.target }}"
          scripts/package-macos-pkg.sh

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v7
        with:
          name: AlmaOneBotBridge-macOS-${{ matrix.package_arch }}-PKG
          path: |
            dist/macos/*.pkg
            dist/macos/*.pkg.sha256
          if-no-files-found: error

      - name: Attach PKG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi

          if [[ "${SIGNING_MODE}" == "unsigned" ]]; then
            RELEASE_NOTES="Unsigned macOS PKG installer for $TAG_NAME. Gatekeeper will warn because this build has no Developer ID signature or notarization."
          else
            RELEASE_NOTES="Signed and notarized macOS PKG installer for $TAG_NAME."
          fi

          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --generate-notes \
              --notes "$RELEASE_NOTES" \
              || true
          fi

          gh release upload "$TAG_NAME" dist/macos/*.pkg dist/macos/*.pkg.sha256 --clobber

  build-windows:
    name: Build Windows installer and ZIP
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: scripts/verify-version.sh --tag "$GITHUB_REF_NAME"

      - name: Verify package version metadata
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: scripts/verify-version.sh

      - name: Install Rust Windows GNU target
        run: rustup target add x86_64-pc-windows-gnu

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            platforms/windows -> platforms/windows
          cache-targets: true

      - name: Install .NET SDK for Velopack
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install MSYS2 MinGW GNU tools
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-binutils
            mingw-w64-x86_64-gcc

      - name: Add MSYS2 GNU tools to PATH
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          "C:\msys64\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Run Rust tests on Windows GNU target
        shell: pwsh
        run: cargo test --target x86_64-pc-windows-gnu

      - name: Check Windows tray app
        shell: pwsh
        run: cargo check --manifest-path platforms/windows/Cargo.toml --target x86_64-pc-windows-gnu

      - name: Build Windows Velopack installer
        shell: pwsh
        run: scripts/package-windows-velopack.ps1

      - name: Build Windows ZIP package
        shell: pwsh
        run: scripts/package-windows-zip.ps1 -SkipBuild

      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@v7
        with:
          name: AlmaOneBotBridge-Windows-x86_64-Installer
          path: |
            dist/windows-velopack/*.msi
            dist/windows-velopack/*.msi.sha256
          if-no-files-found: error

      - name: Upload Windows ZIP artifacts
        uses: actions/upload-artifact@v7
        with:
          name: AlmaOneBotBridge-Windows-x86_64-ZIP
          path: |
            dist/windows-zip/*
          if-no-files-found: error

      - name: Attach Windows artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tagName = $env:GITHUB_REF_NAME

          gh release view $tagName *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tagName `
              --title $tagName `
              --generate-notes `
              --notes "Windows MSI installer and portable ZIP for $tagName."
          }

          # User-facing only: our ZIP + MSI (+ sha256). Skip Velopack update channel
          # files (nupkg, RELEASES, assets*.json, *-Setup.exe, *-Portable.zip).
          $releaseFiles = @(
            Get-ChildItem dist/windows-zip -File -Filter 'AlmaOneBotBridge-*-windows-x86_64.zip' -ErrorAction Stop
            Get-ChildItem dist/windows-zip -File -Filter 'AlmaOneBotBridge-*-windows-x86_64.zip.sha256' -ErrorAction Stop
            Get-ChildItem dist/windows-velopack -File -Filter '*.msi' -ErrorAction Stop
            Get-ChildItem dist/windows-velopack -File -Filter '*.msi.sha256' -ErrorAction Stop
          )
          gh release upload $tagName @($releaseFiles | ForEach-Object { $_.FullName }) --clobber
